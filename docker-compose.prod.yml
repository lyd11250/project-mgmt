# 生产覆盖（云服务器）：自动重启；仅前端对外暴露 80；DB/Redis 不暴露端口
# 用法：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 敏感配置通过根目录 .env 注入（参考 .env.example）

services:
  postgres:
    restart: always

  redis:
    restart: always

  minio:
    restart: always

  backend:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  frontend:
    restart: always
    ports:
      - "80:80"
