spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}

logging:
  level:
    root: info
    com.github.lyd11250.bedrock: info

# 生产环境关闭 API 文档（不对外暴露接口结构）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
