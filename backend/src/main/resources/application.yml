spring:
  application:
    name: saas-bedrock
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:50MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:50MB}

server:
  port: 8080

# 文件存储（MinIO）。端点/密钥按环境在 application-{dev,prod}.yml 覆盖。
bedrock:
  file:
    # 上传白名单扩展名（小写，逗号分隔；空 = 不限制）
    allowed-ext: ${FILE_ALLOWED_EXT:}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:bedrock}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-token（会话由 sa-token-redis-jackson 持久化到 Redis）
sa-token:
  token-name: satoken
  timeout: 2592000        # 会话有效期 30 天
  active-timeout: 7200    # 闲置 2 小时无操作自动失效（每次请求自动续期活跃时间）
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

# API 文档（springdoc-openapi）：UI=/swagger-ui.html，JSON=/v3/api-docs。生产环境在 application-prod.yml 关闭。
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
