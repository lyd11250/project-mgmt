spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bedrock}
    username: ${DB_USER:bedrock}
    password: ${DB_PASSWORD:bedrock}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

logging:
  level:
    root: info
    com.github.lyd11250.bedrock: debug
