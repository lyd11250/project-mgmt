# 基础编排：PostgreSQL + Redis + 后端 + 前端
# 按环境叠加 docker-compose.dev.yml 或 docker-compose.prod.yml 使用

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bedrock}
      POSTGRES_USER: ${DB_USER:-bedrock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bedrock}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bedrock}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-bedrock}
      DB_USER: ${DB_USER:-bedrock}
      DB_PASSWORD: ${DB_PASSWORD:-bedrock}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # 前端：容器内多阶段构建（node 构建 → nginx 托管静态资源 + 反代 /api）。
  # 构建在测试机 Docker（Linux）内进行，平台一致，规避跨平台 npm ci 的 lock 漂移；
  # 前端改动随 `up -d --build` 自动重建，dist 不入库、不手动上传。
  frontend:
    build: ./frontend
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
