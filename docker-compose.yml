# 基础编排：PostgreSQL + Redis + 后端 + 前端
# 按环境叠加 docker-compose.dev.yml 或 docker-compose.prod.yml 使用

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bedrock}
      POSTGRES_USER: ${DB_USER:-bedrock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bedrock}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bedrock}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  # 对象存储：MinIO（文件上传下载的存储后端，兼容 S3 协议）
  # 固定到 Docker Hub 上最后发布的稳定版（MinIO 已于 2025-10 停止向 Docker Hub 发布免费镜像、仓库归档）。
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-bedrock}
      DB_USER: ${DB_USER:-bedrock}
      DB_PASSWORD: ${DB_PASSWORD:-bedrock}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bedrock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  # 前端：容器内多阶段构建（node 构建 → nginx 托管静态资源 + 反代 /api）。
  # 构建在测试机 Docker（Linux）内进行，平台一致，规避跨平台 npm ci 的 lock 漂移；
  # 前端改动随 `up -d --build` 自动重建，dist 不入库、不手动上传。
  frontend:
    build: ./frontend
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
